<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Crop Recommendation System</title>
    <!-- Modern Font: Outfit -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #2E7D32;
            --primary-hover: #1B5E20;
            --accent-color: #4CAF50;
            --background-overlay: rgba(255, 255, 255, 0.15);
            --card-bg: rgba(255, 255, 255, 0.85);
            --text-main: #2c3e50;
            --text-muted: #546e7a;
            --border-radius: 16px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: url('/static/images/farm_background.png') no-repeat center center fixed;
            background-size: cover;
            position: relative;
            color: var(--text-main);
        }

        /* Dark gradient overlay for better contrast */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0.1) 100%);
            z-index: 0;
        }

        .main-wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 900px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header-section {
            text-align: center;
            color: white;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
            margin-bottom: 10px;
        }

        .header-section h1 {
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 10px;
            letter-spacing: -0.5px;
        }

        .header-section p {
            font-size: 1.2rem;
            font-weight: 300;
            opacity: 0.9;
        }

        /* Glassmorphism Containers */
        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: var(--border-radius);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.15);
            padding: 30px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        .glass-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
        }

        /* Location Section */
        .location-section {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
            flex-wrap: wrap;
        }

        .location-info {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-grow: 1;
        }

        .location-icon {
            color: var(--primary-color);
            font-size: 1.5rem;
            background: rgba(76, 175, 80, 0.15);
            padding: 12px;
            border-radius: 50%;
        }

        .location-input-wrapper {
            position: relative;
            flex-grow: 1;
        }

        .location-input-wrapper input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 500;
            color: var(--text-main);
            transition: border-color 0.3s;
            background: rgba(255, 255, 255, 0.9);
        }

        .location-input-wrapper input:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(46, 125, 50, 0.3);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(46, 125, 50, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: #fff;
            color: var(--primary-color);
            border: 2px solid var(--primary-color);
            box-shadow: none;
        }

        .btn-secondary:hover {
            background: #f1f8f1;
            box-shadow: 0 4px 15px rgba(46, 125, 50, 0.1);
        }

        /* Form Layout */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .section-title {
            font-size: 1.4rem;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 2px solid rgba(76, 175, 80, 0.2);
            padding-bottom: 8px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            position: relative;
        }

        .input-group label {
            font-weight: 500;
            font-size: 0.95rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .input-wrapper {
            position: relative;
            background: white;
            border-radius: 10px;
            border: 1px solid #ddd;
            overflow: hidden;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .input-wrapper:focus-within {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(76, 175, 80, 0.1);
        }

        .input-wrapper input {
            width: 100%;
            border: none;
            padding: 12px 16px;
            font-size: 1rem;
            background: transparent;
            color: var(--text-main);
            font-weight: 500;
        }

        .input-wrapper input:focus {
            outline: none;
        }
        
        .input-icon {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #aaa;
            font-size: 0.9rem;
        }

        .action-row {
            display: flex;
            justify-content: flex-end;
            margin-top: 30px;
            gap: 15px;
        }

        .full-width-btn {
            width: 100%;
            justify-content: center;
            padding: 16px;
            font-size: 1.1rem;
            margin-top: 10px;
        }

        .weather-btn {
            margin-top: 15px;
            width: 100%;
            justify-content: center;
            background: linear-gradient(135deg, #0288D1 0%, #03A9F4 100%);
        }

        .weather-btn:hover {
            background: linear-gradient(135deg, #01579B 0%, #0288D1 100%);
            box-shadow: 0 6px 20px rgba(3, 169, 244, 0.4);
        }

        @media (max-width: 768px) {
            .header-section h1 {
                font-size: 2.2rem;
            }
            .location-section {
                flex-direction: column;
                align-items: stretch;
            }
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <div class="header-section">
            <h1>Intelligent Crop Recommendation</h1>
            <p>Harness AI to find the optimal crop for your land, soil, and climate.</p>
        </div>

        <!-- Location Section -->
        <div class="glass-card location-section">
            <div class="location-info">
                <i class="fa-solid fa-map-location-dot location-icon"></i>
                <div class="location-input-wrapper">
                    <input type="text" id="state" placeholder="Enter State or click Auto Detect">
                </div>
            </div>
            <button class="btn" onclick="autoDetectLocation()">
                <i class="fa-solid fa-location-crosshairs"></i> Auto Detect Target
            </button>
        </div>

        <div class="glass-card">
            <!-- Soil Data -->
            <h2 class="section-title"><i class="fa-solid fa-seedling" style="color: #795548;"></i> Soil Nutrient Levels</h2>
            <div class="form-grid">
                <div class="input-group">
                    <label for="Nitrogen">Nitrogen (N)</label>
                    <div class="input-wrapper">
                        <input type="number" step="any" id="Nitrogen" placeholder="e.g. 50">
                        <i class="fa-solid fa-n input-icon"></i>
                    </div>
                </div>
                <div class="input-group">
                    <label for="Potassium">Potassium (K)</label>
                    <div class="input-wrapper">
                        <input type="number" step="any" id="Potassium" placeholder="e.g. 40">
                        <i class="fa-solid fa-k input-icon"></i>
                    </div>
                </div>
                <div class="input-group">
                    <label for="Phosphorus">Phosphorus (P)</label>
                    <div class="input-wrapper">
                        <input type="number" step="any" id="Phosphorus" placeholder="e.g. 50">
                        <i class="fa-solid fa-p input-icon"></i>
                    </div>
                </div>
                <div class="input-group">
                    <label for="ph">Soil pH</label>
                    <div class="input-wrapper">
                        <input type="number" step="any" id="ph" placeholder="e.g. 6.5">
                        <i class="fa-solid fa-droplet input-icon"></i>
                    </div>
                </div>
            </div>

            <br><br>
            
            <!-- Weather Data -->
            <h2 class="section-title"><i class="fa-solid fa-cloud-sun" style="color: #03A9F4;"></i> Climatic Data</h2>
            <div class="form-grid">
                <div class="input-group">
                    <label for="temperature">Temperature (°C)</label>
                    <div class="input-wrapper">
                        <input type="number" step="any" id="temperature" placeholder="e.g. 25.5">
                        <i class="fa-solid fa-temperature-half input-icon"></i>
                    </div>
                </div>
                <div class="input-group">
                    <label for="humidity">Humidity (%)</label>
                    <div class="input-wrapper">
                        <input type="number" step="any" id="humidity" placeholder="e.g. 70">
                        <i class="fa-solid fa-droplet input-icon"></i>
                    </div>
                </div>
                <div class="input-group">
                    <label for="rainfall">Rainfall (mm)</label>
                    <div class="input-wrapper">
                        <input type="number" step="any" id="rainfall" placeholder="e.g. 150">
                        <i class="fa-solid fa-cloud-rain input-icon"></i>
                    </div>
                </div>
                <div class="input-group" style="display: flex; justify-content: flex-end;">
                    <button type="button" class="btn weather-btn" onclick="getWeather()">
                        <i class="fa-solid fa-satellite-dish"></i> Fetch Live Weather
                    </button>
                </div>
            </div>

            <!-- Submit Button -->
            <button type="button" class="btn full-width-btn" onclick="submitSoilForm()">
                <i class="fa-solid fa-wand-magic-sparkles"></i> Generate AI Recommendation
            </button>
        </div>
    </div>

    <!-- Loading Overlay (Hidden by default) -->
    <div id="loading" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.8); z-index:9999; justify-content:center; align-items:center; flex-direction:column;">
        <i class="fa-solid fa-circle-notch fa-spin fa-3x" style="color:var(--primary-color)"></i>
        <h3 style="margin-top:20px; font-weight:600; color:var(--text-main);">Analyzing Agricultural Data...</h3>
    </div>

    <script>
        let currentLatitude = 0;
        let currentLongitude = 0;

        function showLoading() { document.getElementById('loading').style.display = 'flex'; }
        function hideLoading() { document.getElementById('loading').style.display = 'none'; }

        function autoDetectLocation() {
            const btn = document.querySelector('.location-section button');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Locating...';
            
            if ('geolocation' in navigator) {
                navigator.geolocation.getCurrentPosition(function(position) {
                    currentLatitude = position.coords.latitude;
                    currentLongitude = position.coords.longitude;

                    fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${currentLatitude}&longitude=${currentLongitude}&localityLanguage=en`)
                    .then(response => response.json())
                    .then(data => {
                        const stateName = data.localityInfo.administrative[1].name;
                        document.getElementById('state').value = stateName; 
                        btn.innerHTML = '<i class="fa-solid fa-check"></i> Found';
                        btn.style.background = '#4CAF50';
                        setTimeout(() => {
                            btn.innerHTML = '<i class="fa-solid fa-location-crosshairs"></i> Auto Detect Target';
                            btn.style.background = '';
                        }, 3000);
                    })
                    .catch(error => {
                        alert('Unable to retrieve location data: ' + error);
                        btn.innerHTML = '<i class="fa-solid fa-location-crosshairs"></i> Auto Detect Target';
                    });
                }, function(error) {
                    alert('Error occurred. Error code: ' + error.code);
                    btn.innerHTML = '<i class="fa-solid fa-location-crosshairs"></i> Auto Detect Target';
                });
            } else {
                alert('Geolocation is not supported by this browser.');
                btn.innerHTML = '<i class="fa-solid fa-location-crosshairs"></i> Auto Detect Target';
            }
        }

        function getWeather() {
            if (currentLatitude === 0 && currentLongitude === 0) {
                alert("Please auto-detect your location first!");
                return;
            }
            
            const btn = document.querySelector('.weather-btn');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Fetching...';

            const apiKey = '5a6167a0a92b9db899444c310fcacc1d'; 
            fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${currentLatitude}&lon=${currentLongitude}&appid=${apiKey}&units=metric`)
            .then(response => response.json())
            .then(data => {
                document.getElementById('temperature').value = data.main.temp;
                document.getElementById('humidity').value = data.main.humidity;
                document.getElementById('rainfall').value = data.rain ? data.rain['1h'] : (Math.random() * 50 + 50).toFixed(1); // Add some fake dummy data for demo if no rain
                btn.innerHTML = '<i class="fa-solid fa-check"></i> Synced!';
                btn.style.background = '#4CAF50';
                setTimeout(() => {
                    btn.innerHTML = '<i class="fa-solid fa-satellite-dish"></i> Fetch Live Weather';
                    btn.style.background = '';
                }, 3000);
            })
            .catch(error => {
                console.error('Failed to retrieve weather data:', error);
                alert('Failed to retrieve weather data');
                btn.innerHTML = '<i class="fa-solid fa-satellite-dish"></i> Fetch Live Weather';
            });
        }

        function submitSoilForm() {
            event.preventDefault();

            // Basic validation
            const fields = ['state', 'Nitrogen', 'Potassium', 'Phosphorus', 'ph', 'temperature', 'humidity', 'rainfall'];
            for(let f of fields) {
                if(!document.getElementById(f).value) {
                    alert(`Please fill in ${f}!`);
                    return;
                }
            }

            showLoading();

            const data = {
                state: document.getElementById('state').value,
                nitrogen: document.getElementById('Nitrogen').value,
                potassium: document.getElementById('Potassium').value,
                phosphorus: document.getElementById('Phosphorus').value,
                ph: document.getElementById('ph').value,
                temperature: document.getElementById('temperature').value,
                rainfall: document.getElementById('rainfall').value,
                humidity: document.getElementById('humidity').value
            };

            fetch('/submit', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(data)
            })
            .then(response => response.json())
            .then(data => {
                if (data.redirect) {
                    window.location.href = data.redirect;
                } else {
                    hideLoading();
                    alert('Error: No redirect URL provided.');
                }
            })
            .catch(error => {
                hideLoading();
                console.error('Error:', error);
                alert('Analysis failed. Please try again.');
            });
        }
    </script>
</body>
</html>
